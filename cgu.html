</head>

<body>
  <canvas id="bg-stars"></canvas>
  <header>
    <div class="logo">Mystia</div>
    <nav class="nav-desktop">
      <a href="index.html" data-i18n="menu_home">Accueil</a>

      <a href="delete-account.html" data-i18n="menu_delete_account">Supprimer mon compte</a>
    </nav>
    <div class="header-actions">
      <button class="lang-switch" id="langBtn">
        <span id="flagIcon" aria-label="switch language" style="font-size:1.15em;">EN 🇬🇧</span>
      </button>
      <button id="burgerBtn" class="burger" aria-label="menu">
        <span></span><span></span><span></span>

    </div>

  </header>

  <!-- <iframe src="terms/cgu_mystia_fr.pdf" width="100%" height="700px" style="border:1px solid #ccc;border-radius:12px;margin-top:20px;"></iframe> -->
  <div id="pdf-container"></div>

  <script type="module">
    import * as pdfjsLib from '/js/pdf.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = '/js/pdf.worker.mjs';

    const container = document.getElementById('pdf-container');

   function getLang() {
    // Utiliser la même clé que mystia.js
    return localStorage.getItem('mystiaLang') || (navigator.language.startsWith("en") ? "en" : "fr");
  }

    function loadPDF(lang) {
      container.innerHTML = ''; // Vide les anciens canvas si on change de langue
      const url = `/terms/cgu_mystia_${lang}.pdf`;

      const loadingTask = pdfjsLib.getDocument(url);
      loadingTask.promise.then(pdf => {
        const totalPages = pdf.numPages;

        for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
          pdf.getPage(pageNum).then(page => {
            const scale = window.innerWidth < 768 ? 0.9 : 1.5;
            const viewport = page.getViewport({ scale });

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            container.appendChild(canvas);

            const renderContext = {
              canvasContext: context,
              viewport: viewport
            };
            page.render(renderContext);
          });
        }
      }).catch(error => {
        container.innerHTML = `<p style="color: red;">Erreur lors du chargement du PDF.</p>`;
        console.error(error);
      });
    }

    const currentLang = getLang();
    loadPDF(currentLang);
    // Le changement de langue (et le rechargement de la page) est géré par mystia.js
  </script>
