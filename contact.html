<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Mystia – Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<script>
    function copyEmail() {
        const email = 'my.mystia.contact@gmail.com';
        navigator.clipboard.writeText(email).then(() => {
            const feedback = document.getElementById('copyFeedback');
            feedback.classList.add('show');
            setTimeout(() => {
                feedback.classList.remove('show');
            }, 2000);
        });
    }
</script>

<body>
    <canvas id="bg-stars"></canvas>
    <header>
        <div class="logo">Mystia</div>
        <nav class="nav-desktop">
            <a href="index.html" data-i18n="menu_home">Accueil</a>
            <a href="cgu.html" data-i18n="menu_cgu">CGU</a>
            <a href="privacy.html" data-i18n="menu_privacy">Politique de Confidentialité</a>
            <a href="contact.html" data-i18n="menu_contact">Contact</a>
            <a href="delete-account.html" data-i18n="menu_delete_account">Supprimer mon compte</a>
        </nav>
        <div class="header-actions">
            <button class="lang-switch" id="langBtn">
                <span id="flagIcon" aria-label="switch language" style="font-size:1.15em;">EN 🇬🇧</span>
            </button>
            <button id="burgerBtn" class="burger" aria-label="menu">
                <span></span><span></span><span></span>
            </button>
        </div>

    </header>

    <main>
        <section>
            <div class="home-subtitle-desc" data-i18n="contact_title">Besoin de nous contacter ?</div>
            <p class="contact-info" data-i18n="contact_subtitle">Tu peux nous joindre à l'adresse email suivante :</p>
            <span class="contact-address">
                my.mystia.contact@gmail.com
                <button class="copy-btn" onclick="copyEmail()" title="Copier l'adresse">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </span>
            <span class="copy-feedback" id="copyFeedback" data-i18n="copy_email">Copié !</span>
        </section>
    </main>
    <nav class="nav-mobile hide" id="navMobile">
        <a href="index.html" data-i18n="menu_home">Accueil</a>
        <a href="cgu.html" data-i18n="menu_cgu">CGU</a>
        <a href="privacy.html" data-i18n="menu_privacy">Politique de Confidentialité</a>
        <a href="contact.html" data-i18n="menu_contact">Contact</a>
        <a href="delete-account.html" data-i18n="menu_delete_account">Supprimer mon compte</a>
    </nav>
    <footer>
        <a href="mentions.html" class="footer-link" data-i18n="mention_title">Mentions légales</a>
    </footer>

    <script src="js/translations.js"></script>
    <script src="js/mystia.js"></script>

</body>

</html>
